<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>order</title>
    <link rel="stylesheet" href="order.css">
</head>
<body>
    <div id="order">
        <h1 id="orderheading" class="font">order now</h1>
        <form action="order.html">
            <label for="name" class="font">name</label>
            <input type="text" id="name" required>
            <br>
            <br>
            <label for="address" class="font">address</label>
            <input type="text" id="address" required>
            <br>
            <br>
            <label for="phone" class="font">phone</label>
            <input type="number" id="phone" required>
            <br>
            <br>
            <label for="email" class="font">email</label>
            <input type="email" id="email" required>
            <br>
            <br>
            <label for="shoe" class="font">shoe</label>
            <select id="shoe">
                <option value="nike air force">nike air force</option>
                <option value="nike air jordan 4">nike air jordan 4</option>
                <option value="nike air jordan 1">nike air jordan 1</option>
                <option value="adidas campus">adidas campus</option>
            </select>
            <br>
            <br>
            <input type="submit" value="order" id="orderbtn" class="btn">
        </form>
    </div>
</body>
</html>
